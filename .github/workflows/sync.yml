# ============================================================
#  Dat file nay tai duong dan:  .github/workflows/sync.yml
#  (tao thu muc .github/workflows trong repo cua ban)
# ============================================================
name: Tweet to Binance Square

on:
  schedule:
    # ~moi 15 phut. Tranh dau gio (phut :00) cho do bi tre.
    # Luu y: GitHub chay theo gio UTC va co the tre 10-30 phut luc cao diem.
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:   # cho phep bam "Run workflow" de chay tay / test

permissions:
  contents: write      # can quyen nay de luu lai state/last_id.txt

concurrency:
  group: tweet-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # >>> DOI dong duoi thanh @username X cua ban (bo dau @) <<<
      TWITTER_USERNAME: "phamduydong179"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cai thu vien
        run: pip install requests requests-oauthlib

      - name: Dong bo tweet -> Binance Square
        env:
          TWITTER_API_KEY:            ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:         ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:       ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET:      ${{ secrets.TWITTER_ACCESS_SECRET }}
          BINANCE_SQUARE_OPENAPI_KEY: ${{ secrets.BINANCE_SQUARE_OPENAPI_KEY }}
        run: python tweet_to_square_ci.py

      - name: Luu trang thai (neu thay doi)
        run: |
          if [[ -n "$(git status --porcelain state/last_id.txt)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/last_id.txt
            git commit -m "update last tweet id [skip ci]"
            git push
          else
            echo "Khong co thay doi state, bo qua commit."
          fi
